<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading List Sync</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 320px;
      background: #ffffff;
      color: #1a1a1a;
    }

    .container {
      padding: 20px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 2px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 11px;
      color: #666;
      margin-bottom: 16px;
    }

    .sync-status {
      background: #f5f5f5;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 16px;
    }

    .sync-status.synced {
      background: #f0f9f0;
    }

    .sync-status.pending {
      background: #fef9f0;
    }

    .sync-status.error {
      background: #fef0f0;
    }

    .sync-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 500;
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #888;
    }

    .sync-status.synced .sync-dot {
      background: #22c55e;
    }

    .sync-status.pending .sync-dot {
      background: #f59e0b;
    }

    .sync-status.error .sync-dot {
      background: #ef4444;
    }

    .sync-details {
      font-size: 10px;
      color: #666;
      margin-top: 4px;
      margin-left: 14px;
    }

    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #eee;
    }

    .stat-item {
      flex: 1;
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.2;
    }

    .stat-label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn {
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      margin-bottom: 8px;
    }

    .btn:last-child {
      margin-bottom: 0;
    }

    .btn-primary {
      background: #1a1a1a;
      color: #fff;
    }

    .btn-primary:hover {
      background: #333;
    }

    .btn-secondary {
      background: #f5f5f5;
      color: #1a1a1a;
    }

    .btn-secondary:hover {
      background: #eee;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-group {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .btn-group .btn {
      flex: 1;
      margin-bottom: 0;
    }

    .items-list {
      max-height: 200px;
      overflow-y: auto;
      margin-top: 16px;
      border-top: 1px solid #eee;
      padding-top: 12px;
    }

    .item {
      padding: 8px 0;
      border-bottom: 1px solid #f5f5f5;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item-title {
      font-size: 12px;
      color: #1a1a1a;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-url {
      font-size: 10px;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-status {
      font-size: 9px;
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .item-status.read {
      color: #22c55e;
    }

    .item-status.unread {
      color: #888;
    }

    .message {
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 11px;
      margin-top: 12px;
    }

    .message.success {
      background: #f0f9f0;
      color: #166534;
    }

    .message.error {
      background: #fef0f0;
      color: #991b1b;
    }

    .message.info {
      background: #f0f7ff;
      color: #1e40af;
    }

    .hidden {
      display: none;
    }

    .loading {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .footer {
      font-size: 10px;
      color: #aaa;
      text-align: center;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #f0f0f0;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Reading List Sync</h1>
    <p class="subtitle">Auto-syncs daily to Supabase</p>

    <div class="sync-status" id="sync-status">
      <div class="sync-indicator">
        <span class="sync-dot"></span>
        <span id="sync-label">Checking...</span>
      </div>
      <div class="sync-details" id="sync-details">Loading status...</div>
    </div>

    <div class="stats">
      <div class="stat-item">
        <div class="stat-value" id="total-count">-</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="unread-count">-</div>
        <div class="stat-label">Unread</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="read-count">-</div>
        <div class="stat-label">Read</div>
      </div>
    </div>

    <button class="btn btn-primary" id="sync-btn">Sync to Database</button>

    <div class="btn-group">
      <button class="btn btn-secondary" id="export-btn">Export JSON</button>
      <button class="btn btn-secondary" id="copy-btn">Copy</button>
    </div>

    <button class="btn btn-secondary" id="toggle-list-btn">Show Items</button>

    <div id="message" class="message hidden"></div>

    <div id="items-list" class="items-list hidden"></div>

    <div class="footer">
      Syncs once per day on browser startup
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
